<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur</title>
    <link rel="stylesheet" href="hotspot.css">
</head>
<body>

    <div class="login-card has-border-top">
        <span class="wifi-icon">⚠️</span>

        <h2>Un problème est survenu</h2>

        <div class="error-box">
            $(error)

        <form action="$(link-login)" name="login" method="post">
            <button type="submit" class="secondary">Retour à l'accueil</button>
        </form>
    </div>

</body>
</html>
